<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="page_head(title)">

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport"
	content="width=device-width,initial-scale=1.0,minimum-scale=1.0">

<title>[[${title}]]</title>

<link rel="stylesheet" type="text/css" th:href="@{/style.css}">
<link rel="stylesheet" type="text/css" th:href="@{/fontawesome/all.css}">
<link rel="stylesheet" type="text/css"
	th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" />
<script type="text/javascript"
	th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script type="text/javascript" th:src="@{/js/common.js}"></script>


</head>
<body>
	<th th:fragment="column_link(moduleUrl,fieldName,columnLabel,cssClass)" th:classappend="${cssClass}"><a
		class="text-white text-decoration-none"
		th:href=" @{${moduleUrl}+'/page/'+ ${currentPage} +'?sortField=' +${fieldName}+'&sortDir=' + ${sortField != fieldName ? sortDir:reverseSortDir}+ ${keyword !=null?'&keyword='+keyword:''}}">
			[[${columnLabel}]] </a>
			 <span th:if="${sortField == fieldName}"
		th:class="${sortDir == 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down' }"></span>
	</th>

	
	<a th:fragment="page_link(moduleURL,pageNum,label)"
	class="page-link"
	th:href="@{__${moduleURL}__/page/{pageNum}(
			pageNum =${pageNum},
			sortField=${sortField},
			sortDir=${sortDir},
			keyword=${keyword}
			)}">[[${label}]]</a>

<div th:fragment="footer" class="text-center m-3">
			<p>Shopme Control Panel - Copyright &copy; Shopme</p>
		</div>
		
	<div th:fragment="status(enabled, entityName, entityUrl)" th:remove="tag">

    <a th:if="${enabled}"
       class="fas fa-check-circle icon-green fa-2x"
       th:href="@{${entityUrl} + '/enabled/false'}"
       th:title="|Disable this ${entityName}|">
    </a>

    <a th:if="${!enabled}"
       class="fas fa-check-circle icon-dark fa-2x"
       th:href="@{${entityUrl} + '/enabled/true'}"
       th:title="|Enable this ${entityName}|">
    </a>

	</div>

		<div th:fragment="edit(entityName,editURL)" th:remove="tag">
			<a class="fas fa-edit fa-2x icon-green"
			th:href="@{${editURL}}"
			title="'Edit this'+${entityName}"></a>
			&nbsp;
		</div>
		<div th:fragment="delete(entityName,entityId,deleteURL,visible)" th:remove="tag">
			<th:block th:if="${visible}">
			<a class="fas fa-trash fa-2x icon-dark link-delete"
			th:href="@{${deleteURL}}"
  			 th:entityId="${entityId}"
  	         th:title="|Delete this ${entityName}|">
			</a>
			</th:block>
					
		</div>
		
	<div th:fragment="pagination(moduleURL,entityName)" th:remove="tag">
	<div class="text-center m-1" th:if="${totalItems > 0}">
			<span>Showing [[${entityName}]] # [[${startCount}]] to [[${endCount}]] of
				[[${totalItems}]]</span>
		</div>
		<div class="text-center m-1" th:unless="${totalItems > 0}">
			<span>No [[${entityName}]] Found</span>
		</div>
		<div th:if="${totalPages > 1}">
			<nav>
				<ul class="pagination justify-content-center flex-wrap">
					<li
						th:class="${currentPage > 1 ? 'page-item' : 'page-item disabled'}">
						<a th:replace="fragments :: page_link(${moduleURL},1,'First')"></a>
					</li>

					<li
						th:class="${currentPage > 1 ? 'page-item' : 'page-item disabled'}">
						<a
						th:replace="fragments :: page_link(${moduleURL},${currentPage - 1}, 'Previous')"></a>
					</li>


					<li
						th:class="${currentPage !=i ? 'page-item' : 'page-item active'}"
						th:each="i :${#numbers.sequence(1,totalPages)}"><a
						th:replace="fragments :: page_link(${moduleURL},${i},${i})"></a></li>

					<li
						th:class="${currentPage < totalPages ? 'page-item' :'page-item disabled'}">
						<a th:replace="fragments :: page_link(${moduleURL},${currentPage +1},'Next')"></a>
					</li>
					<li
						th:class="${currentPage < totalPages ? 'page-item' :'page-item disabled'}">
						<a th:replace="fragments :: page_link(${moduleURL},${totalPages},'Last')"></a>
					</li>
				</ul>
			</nav>
		</div>
	
	</div>	
	
	<div th:fragment="search_form_and_message(moduleURL)">
		<form th:action="@{${moduleURL}}" class="d-flex m-3">
			<input type="hidden" name="sortField" th:value="${sortField}">
			<input type="hidden" name="sortDir" th:value="${sortDir}">
			Filter:&nbsp; <input type="seacrh" name="keyword"
				class="form-control w-auto" th:value="${keyword}" required />
			&nbsp;&nbsp;
			<Button type="submit" class="btn btn-primary">
				<i class="fa-solid fa-magnifying-glass icon-white"></i>
			</Button>
			&nbsp;&nbsp;
			<button type="button" class="btn btn-secondary"
				onclick="clearFilter()">
				<i class="fa-solid fa-eraser"></i>
			</button>
		</form>
			<div th:if="${message !=null}" class="alert alert-success text-center">
				[[${message}]]</div>
		
	</div>
	
</body>
</html>
