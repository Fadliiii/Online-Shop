<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sc="https://www.thymeleaf.org/tyhmeleaf-extras-springsecurity6">
<head th:replace="fragments :: page_head('Products - Shopme Admin', 'none')"></head>
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>

		<div>
			<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
			<h2>Manage Products</h2>
			<a th:href="@{/products/new}"
				class="fa-solid fa-folder-plus fa-2x icon-dark mr-2"></a>
			&nbsp;|&nbsp;
			 <a th:href="@{/products/export/csv}"
				class="fa-solid fa-file-csv fa-2x icon-dark mr-2"></a>
			</th:block>
		</div>
	
		<div>
			<form th:action="@{/products/page/1}" class="d-flex m-3" id="searchForm">
			<input type="hidden" name="sortField" th:value="${sortField}">
			<input type="hidden" name="sortDir" th:value="${sortDir}">
			Catgory:
			<select class="form-control w-auto" name="categoryId" id="dropdownCategory">
				<option value="0">All Categories</option>
				
				<th:block th:each = "cat : ${listCategories}">
				<option th:value="${cat.id}" th:selected="(${categoryId} == ${cat.id})">[[${cat.name}]]</option>>
				</th:block>
			</select>
			
			Filter:&nbsp; 
			<input type="seacrh" name="keyword" class="form-control w-auto" th:value="${keyword}" required />
			&nbsp;&nbsp;
			<Button type="submit" class="btn btn-primary">
				<i class="fa-solid fa-magnifying-glass icon-white"></i>
			</Button>
			&nbsp;&nbsp;
			<button type="button" class="btn btn-secondary"
				onclick="clearFilter()">
				<i class="fa-solid fa-eraser"></i>
			</button>
		</form>
			<div th:if="${message !=null}" class="alert alert-success text-center">
				[[${message}]]</div>
		
		</div>
	
	<div class="full-details">
		<table
			class="table table-bordered table-striped table-hover table-responsive-xl">
			<thead class="table-dark">
				<tr>
					<th th:replace="fragments :: column_link('/products','id','ID','none')"/>
					<th>Main Image</th>
					<th th:replace="fragments :: column_link('/products','name','Product Name','none')"/>
					<th th:replace="fragments :: column_link('/products','brand','Brand','none')"/>
					<th th:replace="fragments :: column_link('/products','category','Category','none')"/>
					
					<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
					<th>Enabled</th>
					</th:block>
						
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="product : ${listProducts}">
					<td>[[${product.id}]]</td>
					<td>
						<img th:src ="@{${product.mainImagePath}}" style="width:120px" class="img-fluid"/>
					</td>
					<td>
						<a  class="link-detail" th:href="@{'/products/detail/'+${product.id}}"
							th:title="${product.name}">[[${product.shortName}]]</a>
						</td>
					<td>[[${product.brand.name}]]</td>
					<td>[[${product.category.name}]]</td>
			
					<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
					<td><div th:replace="fragments :: status(${product.enabled},'product','/products/'+${product.id})"></div></td>
					</th:block>
									
					<td>
						<a class="fas fa-file-alt fa-2x icon-green link-detail"
						th:href="@{'/products/detail/'+${product.id}}"
						title="View detail of this product"></a>
						&nbsp;
						
						<th:block sec:authorize="hasAnyAuthority('Admin','Editor','Salesperson')">		
						<div th:replace="fragments :: edit('product','/products/edit/'+${product.id})"/>
						</th:block>
						&nbsp;
						
						<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
						<div th:replace="fragments :: delete('product',${product.id},'/products/delete/'+${product.id},true)"/>
						</th:block>
						
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	</div>
	<div th:replace="fragments :: pagination('/products','products')"></div>
	<div th:replace="modal_fragment :: confirm_modal"></div>

	<div class="modal fade" id="detailModal">
		<div class="modal-dialog modal-xl">
			<div class="modal-content">
			</div>
		</div>
	</div>

	<div th:replace="fragments :: footer"></div>

<script th:src="@{/js/common_list.js}"></script>
<script type="text/javascript">
		moduleURL = "[[@{/products}]]";

		$(document).ready(function(e){
			$(".link-delete").on("click",function(e){
				e.preventDefault();
				showDeleteConfirmModal($(this),'product')
			});
			
			$(".link-detail").on("click",function(e){
				e.preventDefault();
				linkDetailURL = $(this).attr("href");
				$("#detailModal").modal("show").find(".modal-content").load(linkDetailURL);
			});
			
			$("#dropdownCategory").on("change",function(){
				$("#searchForm").submit();
			});
		});

</script>
</body>
</html>
