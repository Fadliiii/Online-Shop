<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<head th:replace="fragments :: page_head(${pageTitle}, 'tag')"/>
	<link rel="stylesheet"th:href="@{/richtext/richtext.min.css}"/>
	<script th:src ="@{/richtext/jquery.richtext.min.js}"></script>	
</head>

	
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>
		<div>
			<h2>Manage Product | [[${pageTitle}]]</h2>
		</div>

		<form th:action="@{/products/save}" method="post"
			onsubmit="return checkUnique(this)"
			enctype="multipart/form-data"
			th:object="${product}">
			<input type="hidden" th:field="*{id}">
			<input th:if="${product.category != null}" 
			type="hidden" id="categoryId" th:value="${product.category.id}"/> 
			<div>
				<ul class="nav nav-tabs" id="myTab" role="tablist">
					<li class="nav-item" role="presentation">
						<button class="nav-link active" data-bs-toggle="tab"
							data-bs-target="#overview" type="button" role="tab">Overview</button>
					</li>
					<li class="nav-item" role="presentation">
						<button class="nav-link" data-bs-toggle="tab"
							data-bs-target="#description" type="button" role="tab">Description</button>
					</li>
					<li class="nav-item" role="presentation">
						<button class="nav-link" data-bs-toggle="tab"
							data-bs-target="#images" type="button" role="tab">Images</button>
					</li>
					<li class="nav-item" role="presentation">
						<button class="nav-link" id="settings-tab" data-bs-toggle="tab"
							data-bs-target="#details" type="button" role="tab">Details</button>
					</li>
					
					<li class="nav-item" role="presentation">
						<button class="nav-link" id="settings-tab" data-bs-toggle="tab"
							data-bs-target="#shipping" type="button" role="tab">Shipping</button>
					</li>
				</ul>

				<!-- Tab panes -->
				<div class="tab-content">
					<div class="tab-pane active p-3" id="overview" role="tabpanel">
					
						<div th:replace="products/product_overview :: content"></div>
					</div>
				
					<div class="tab-pane" id="description" role="tabpanel">
					
						<th:block sec:authorize="hasAnyAuthority('Salesperson')">
						<div th:replace="products/product_description_read_only :: content"></div>
						</th:block>
						
						<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
					 	<div th:replace="products/product_description :: content"></div>
					 	</th:block>
					</div>
				
					<div class="tab-pane" id="images" role="tabpanel">
						<th:block sec:authorize="hasAnyAuthority('Salesperson')">
						<div th:replace="products/product_images_read_only :: content"></div>
						</th:block>
						
						<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
						<div th:replace="products/product_images :: content"></div>
						</th:block>
						
					</div>
					
					<div class="tab-pane p-2" id="details" role="tabpanel">
						<th:block sec:authorize="hasAnyAuthority('Salesperson')">
						<div th:replace="products/product_details_read_only :: content"></div>
						</th:block>
						
						<th:block sec:authorize="hasAnyAuthority('Admin','Editor')">
						<div th:replace="products/product_details :: content"></div>
						<div class="m-2">
							<input type="button" class="btn btn-secondary p-2" value="Add More Details"
							onclick="addNextDetailSection()">
						</div>
						</th:block>
					</div>
				
					<div class="tab-pane" id="shipping" role="tabpanel">
					 <th:block sec:authorize="hasAnyAuthority('Salesperson')">
						<div th:replace="products/product_shipping_read_only :: content"></div>
						</th:block>
						
						<th:block>
					 	<div th:replace="products/product_shipping :: content"></div>
					 	</th:block>
					
					</div>
				</div>
				<div class="text-center">
					<input type="submit" value="Save" class="btn btn-primary m-3" /> 
					<input type="button" value="Cancel" class="btn btn-secondary" id="buttonCancel" />
				</div>
			</div>
		</form>

		<div th:replace="modal_fragment :: modal_dialog"></div>

		<div th:replace="fragments :: footer"></div>
	</div>

	<script type="text/javascript">
		MAX_FILE_SIZE= 502400;//500kkb
		moduleURL = "[[@{/products}]]";
		brandModuleURL = "[[@{/brands}]]";
		defaultImageThumbnailSrc ="[[@{/images/image-thumbnail.png}]]";
		 checkUniqueUrl = "[[@{/products/check_unique}]]"

	</script>
	<script th:src="@{/js/product_form_images.js}"></script>
	<script th:src="@{/js/product_form_overview.js}"></script>
	<script th:src="@{/js/product_form_details.js}"></script>
	<script th:src="@{/js/common_form.js}"></script>
</body>
</html>
