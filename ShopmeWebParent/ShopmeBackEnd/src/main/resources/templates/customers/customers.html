<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sc="https://www.thymeleaf.org/tyhmeleaf-extras-springsecurity6">
<head
	th:replace="fragments :: page_head('Customers - Shopme Admin', 'none')"></head>
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>

		<div>
			<h2>Manage Customers</h2>
			<a th:href="@{/customers/export/csv}"
				class="fa-solid fa-file-csv fa-2x icon-dark mr-2"></a>
		</div>
	</div>

	<div
		th:replace="fragments :: search_form_and_message"></div>

	<div class="full-details">
		<table
			class="table table-bordered table-striped table-hover table-responsive-xl">
			<thead class="table-dark">
				<tr>
					<th
						th:replace="fragments :: column_link('id','ID','none')" />
					<th
						th:replace="fragments :: column_link('firstName','First Name','none')" />
					<th
						th:replace="fragments :: column_link('lastName','Last Name','none')" />

					<th class="hideable-column">
					<th
						th:replace="fragments :: column_link('email','E-mail','tag')" />
					</th>

					<th class="hideable-column">
					<th
						th:replace="fragments :: column_link('city','City','tag')" />
					</th>

					<th class="hideable-column">
					<th
						th:replace="fragments :: column_link('state','State','tag')" />
					</th>

					<th
						th:replace="fragments :: column_link('country','Country','none')" />
					<th
						th:replace="fragments :: column_link('enabled','Enabled','none')" />
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="customer : ${listCustomers}">
					<td>[[${customer.id}]]</td>
					<td>[[${customer.firstName}]]</td>
					<td>[[${customer.lastName}]]</td>
					<td class="hideable-column">[[${customer.email}]]</td>
					<td class="hideable-column">[[${customer.city}]]</td>
					<td class="hideable-column">[[${customer.state}]]</td>
					<td>[[${customer.country.name}]]</td>
					<td>
						<div th:replace="fragments :: status(${customer.enabled},'customer','/customers/'+${customer.id})"></div>
					</td>
					<td><a class="fas fa-file-alt fa-2x icon-green link-detail"
						th:href="@{'/customers/detail/'+ ${customer.id}}"
						title="View details of this customer"></a>
						<div
							th:replace="fragments :: edit('customer','/customers/edit/'+${customer.id})" />
						&nbsp;
						<div
							th:replace="fragments :: delete('customer',${customer.id},'/customers/delete/'+${customer.id},true)" />
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="less-details">
		<div th:each="customer : ${listCustomer}" class="row m-1">
			<!-- KIRI -->
			<div class="col-4">
				<span><b>[[${customer.fullName}]]</b></span>
			</div>
			<!-- KANAN -->
			<div class="col-8">
				<!-- country -->
				<div class="row">
					<div class="col-12">[[${customer.country.name}]]</div>
				</div>
				<!-- icons -->
				<div class="row mt-1">
					<div class="col-12">
						<div
							th:replace="fragments :: status(
					                    ${customer.enabled},
					                    'customer',
					                    '/customers/' + ${customer.id})">
						</div>
						&nbsp; <a class="fas fa-file-alt fa-2x icon-green link-detail"
							th:href="@{'/customers/detail/' + ${customer.id}}"> </a> &nbsp;
						<div
							th:replace="fragments :: edit(
		                    'customer',
		                    '/customers/edit/' + ${customer.id})">
						</div>
						&nbsp;
						<div
							th:replace="fragments :: delete(
		                    'customer',
		                    ${customer.id},
		                    '/customers/delete/' + ${customer.id},
		                    true)">
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


	<div th:replace="fragments :: pagination('customer')"></div>

	<div th:replace="modal_fragment :: confirm_modal"></div>

	<div th:replace="fragments :: footer"></div>
	
	<div class="modal fade" id="detailModal">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">
			
			</div>
		</div>
	</div>

	<script th:src="@{/js/common_list.js}"></script>
	<script type="text/javascript">
	moduleURL = "[[@{/customers}]]";


		$(document).ready(function(e){
			$(".link-delete").on("click",function(e){
				e.preventDefault();
				showDeleteConfirmModal($(this),'customer')
			});
			
			$(".link-detail").on("click",function(e){
				e.preventDefault();
				linkDetailURL = $(this).attr("href");
				$("#detailModal").modal("show").find(".modal-content").load(linkDetailURL);
			});
		});

</script>
</body>
</html>
