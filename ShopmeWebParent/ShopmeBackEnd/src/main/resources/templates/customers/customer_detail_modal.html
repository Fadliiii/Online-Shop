<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<head th:replace="fragments :: page_head(${pageTitle}, 'tag')" />
</head>

<body>

	<div class="modal-header">
		<h4 class="modal-title">[[${pageTitle}]]</h4>
		<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
	</div>

	<div>
		<ul class="nav nav-tabs" id="myTab" role="tablist">
			<li class="nav-item" role="presentation">
				<button class="nav-link active" data-bs-toggle="tab"
					data-bs-target="#general" type="button" role="tab">General</button>
			</li>

			<li class="nav-item" role="presentation">
				<button class="nav-link" data-bs-toggle="tab"
					data-bs-target="#address" type="button" role="tab">Address</button>
			</li>
		</ul>

		<!-- Tab panes -->
		<div class="tab-content">

			<div class="tab-pane active p-3" id="general" role="tabpanel">
				<div class="form-group row mt-2">
					<label class="col-sm-2 col-form-label ">Customer ID:</label>
					<div class="col-sm-10 ">
						<input type="text" class="form-control" th:value="${customer.id}"
							readonly />
					</div>

					<div class="form-group row mt-2">
						<label class="col-sm-2 col-form-label ">Full Name:</label>
						<div class="col-sm-10 ">
							<input type="text" class="form-control"
								th:value="${customer.fullName}" readonly />
						</div>
					</div>

					<div class="form-group row mt-2">
						<label class="col-sm-2 col-form-label">E-mail:</label>
						<div class="col-sm-10 ">
							<input type="text" class="form-control"
								th:value="${customer.email}" readonly />
						</div>
					</div>

					<div class="form-group row mt-2">
						<label class="col-sm-2 col-form-label ">Phone Number:</label>
						<div class="col-sm-10 ">
							<input type="text" class="form-control"
								th:value="${customer.phoneNumber}" readonly />
						</div>
					</div>

					<div class="form-group row mt-2">
						<label class="col-sm-2 col-form-label ">Enabled:</label>
						<div class="col-sm-10 ">
							<input type="checkbox" th:checked="${customer.enabled}"
								onclick="return false;" />
						</div>
					</div>

					<div class="form-group row mt-2">
						<label class="col-sm-2 col-form-label ">Created Time:</label>
						<div class="col-sm-10 mt-2">
							<span
								th:text="${#dates.format(customer.createdTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
						</div>
					</div>
				</div>
			</div>
			
			<div class="tab-pane p-3" id="address" role="tabpanel">
				<div th:replace="customers/customers_address_readonly :: content"></div>				
			</div>
		</div>

		<div class="modal-footer">
			<a class="btn btn-success" href="" id="yesButton">Yes</a>
			<button type="button" class="btn btn-danger" data-bs-dismiss="modal">No</button>
		</div>
</body>
</html>
