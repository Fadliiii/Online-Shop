<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
</head>
<body>
	<div th:fragment="content" th:remove="tag">
		<form th:action="@{/settings/save_mail_templates}" method="post">
			<div>
				<ul class="nav nav-tabs" id="mailTemplatesTab" role="tablist">
					<li class="nav-item" role="presentation">
						<button class="nav-link active" data-bs-toggle="tab"
							data-bs-target="#customerVerification" type="button" role="tab">Customer
							Verification</button>
					</li>
					<li class="nav-item" role="presentation">
						<button class="nav-link" data-bs-toggle="tab"
							data-bs-target="#orderConfirmation" type="button" role="tab">Order
							Confirmation</button>
					</li>
				</ul>

				<!-- Tab panes -->
				<div class="tab-content">
					<div class="tab-pane active p-3" id="customerVerification"
						role="tabpanel">
						<div
							th:replace="setting/mail_templates/customer_verification :: content"></div>
					</div>

					<div class="tab-pane p-3" id="orderConfirmation" role="tabpanel">
						<h2>Order Confirmation Email Tempalate</h2>
					</div>

				</div>
			</div>
			<div class="text-center">
				<input type="submit" value="Save" class="btn btn-primary m-3" /> <input
					type="button" value="Cancel" class="btn btn-secondary"
					id="buttonCancel" />
			</div>

		</form>
	</div>

</body>
</html>
