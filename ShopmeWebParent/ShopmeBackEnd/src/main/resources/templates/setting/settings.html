<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<head th:replace="fragments :: page_head('Setting - Shopme Admin', 'tag')"/>
	<link rel="stylesheet"th:href="@{/richtext/richtext.min.css}"/>
	<script th:src ="@{/richtext/jquery.richtext.min.js}"></script>	
</head>

	
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>
		<div>
			<h2>Site Settings</h2>
		</div>
		<div th:if="${message !=null}" class="alert alert-success text-center">
			[[${message}]]</div>
		<div>
			<ul class="nav nav-tabs" id="settingTab" role="tablist">

				<li class="nav-item" role="presentation">
					<button class="nav-link active" data-bs-toggle="tab"
						data-bs-target="#general" type="button" role="tab">General</button>
				</li>
				<li class="nav-item" role="presentation">
					<button class="nav-link" data-bs-toggle="tab"
						data-bs-target="#countries" type="button" role="tab">Countries</button>
				</li>
				<li class="nav-item" role="presentation">
					<button class="nav-link" data-bs-toggle="tab"
						data-bs-target="#states" type="button" role="tab">States</button>
				</li>
				<li class="nav-item" role="presentation">
					<button class="nav-link" data-bs-toggle="tab"
						data-bs-target="#mailServer" type="button" role="tab">Mail
						Server</button>
				</li>

				<li class="nav-item" role="presentation">
					<button class="nav-link" data-bs-toggle="tab"
						data-bs-target="#mailTemplates" type="button" role="tab">Mail
						Templates</button>
				</li>
			</ul>

			<!-- Tab panes -->
			<div class="tab-content">
				<div class="tab-pane active p-3" id="general" role="tabpanel">
					<div th:replace="setting/general :: content"></div>
				</div>

				<div class="tab-pane p-3" id="countries" role="tabpanel">
					<div th:replace="setting/countries :: content"></div>
				</div>

				<div class="tab-pane" id="states" role="tabpanel">
					<h2>States</h2>

				</div>

				<div class="tab-pane p-2" id="mailServer" role="tabpanel">
					<h2>Mail Server</h2>
				</div>

				<div class="tab-pane" id="mailTemplates" role="tabpanel">
					<h2>Mail Templates</h2>
				</div>
			</div>

			<div class="toast position-fixed bottom-0 start-0 m-3" role="alert" aria-live="polite" aria-atomic="true" data-bs-delay="3000">
			  <div role="alert" aria-live="assertive" aria-atomic="true">
				  <div class="toast-body">
					<span id="toastMessage"></span>				  
				  </div>
			  </div>
			</div>
			
			<div th:replace="fragments :: footer"></div>
		</div>
	</div>
	<script type="text/javascript">
		MAX_FILE_SIZE = 102400;
		
		contextPath="[[@{/}]]";
		var csrfHeaderName="[[${_csrf.headerName}]]";
		var csrfValue = "[[${_csrf.token}]]";
		</script>
	<script th:src="@{/js/common_form.js}"></script>
	<script th:src="@{/js/countries_setting.js}"></script>
	
</body>
</html>
