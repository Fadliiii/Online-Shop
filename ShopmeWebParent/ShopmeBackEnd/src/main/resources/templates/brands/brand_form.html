<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: page_head(${pageTitle}, 'none')">

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport"
	content="width=device-width,initial-scale=1.0,minimum-scale=1.0">


<link rel="stylesheet" type="text/css"
	th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" />
<script type="text/javascript"
	th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script type="text/javascript"
	th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.min.js}"></script>

</head>
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>
		<div>
			<h2>Manage Category | [[${pageTitle}]]</h2>
		</div>

		<form th:action="@{/brands/save}" method="post"
			style="max-width: 500px; margin: 0 auto"
			enctype="multipart/form-data" 
			onsubmit="return checkUnique(this)"
			th:object="${brand}">
			<input type="hidden" th:field="*{id}">
			<div class="border border-secondary rounded p-3">

				<div class="form-group row">
					<label class="col-sm-4 col-form-label">Brand Name:</label>
					<div class="col-sm-8">
						<input type="text" class="form-control" th:field="*{name}"
							required minlength="3" maxlength="128" />
					</div>
				</div>
				
				<div class="form-group row">
					<label class="col-sm-4 col-form-label">Brand Logo:</label>
					<div class="col-sm-8 mt-2">
						<input type="hidden" th:field="*{logo}" /> 
						<input type="file" id="fileImage" name="fileImage" accept="image/png, image/jpeg"
							th:required="${brand.id == null}"
							class="mb-2" />
						<div class="mt-2">
							<img id="thumbnail" alt="image Review"
								th:src="@{${brand.logoPath}}" class="img-fluid" />
						</div>
					</div>
				</div>
				<div class="form-group row">
					<label class="col-sm-4 col-form-label">Select one or more categories:</label>
					<div class="col-sm-8 mt-2">
						<select class="form-control" th:field="*{categories}" multiple required
							style="resize: vertical; height: 200px">
							<th:block th:each="cat : ${listCategories}">
								<option th:value="${cat.id}">[[${cat.name}]]</option>
							</th:block>
						</select>
					</div>
				</div>

					
					<div class="form-group row">
						<label class="col-sm-4 col-form-label">Chosen categories:</label>
						<div class="col-sm-8">
							<div id="chosenCategories">
							
							</div>
						</div>
					</div>
				
				<div class="text-center">
					<input type="submit" value="Save" class="btn btn-primary m-3" /> 
					<input type="button" value="Cancel" class="btn btn-secondary" id="buttonCancel" />
				</div>
			</div>
		</form>
		
		<div th:replace="modal_fragment :: modal_dialog"></div>			

		<div th:replace="fragments :: footer"></div>
	</div> 

	<script type="text/javascript">
	MAX_FILE_SIZE= 102400;

	
		$(document).ready(function(){
			dropdownCategories = $("#categories");
			divChosenCategories = $("#chosenCategories");
			
		    showChosenCategories(); // tambahkan ini
			
			dropdownCategories.change(function(){
				divChosenCategories.empty();
				showChosenCategories();
			});
		});
			
		function showChosenCategories(){
			dropdownCategories.children("option:selected").each(function(){
				selectedCategories = $(this);
				catId= selectedCategories.val();
				catName= selectedCategories.text().replace(/-/g,"");
				

				divChosenCategories.append("<span class='badge bg-secondary m-1'>" + catName + "</span>");
			});
		}
		
		
		function checkUnique(form){
			let brandId = $("#id").val();
			let brandName = $("#name").val();
			
			csrfValue = $("input[name='_csrf']").val();

			let url = "[[@{/brands/check_unique}]]"
			
			let param = {
					id: brandId,
					name: brandName,
					_csrf :csrfValue
			};
			
			$.post(url,param,function(response){
				
				if(response == "OK"){
					form.submit();
				}
				else if (response == "Duplicate"){
					showWarningModal("Brand name already exist!"+brandName);
				}
				
			}).fail(function(){
				showErrorModal("Could not connect to server");
			});
			return false;
		}
	</script>
	<script th:src="@{/js/common_form.js}"></script>
</body>
</html>
