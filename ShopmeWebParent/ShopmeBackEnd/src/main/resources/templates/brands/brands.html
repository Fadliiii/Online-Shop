<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sc="https://www.thymeleaf.org/tyhmeleaf-extras-springsecurity6">
<head th:replace="fragments :: page_head('Users - Shopme Admin')"></head>
<body>
	<div class="container-fluid">
		<div th:replace="navigation :: menu"></div>

		<div>
			<h2>Manage Brands</h2>
			<a th:href="@{/brands/new}"
				class="fa-solid fa-folder-plus fa-2x icon-dark mr-2"></a>
			&nbsp;|&nbsp; <a th:href="@{/category/export/csv}"
				class="fa-solid fa-file-csv fa-2x icon-dark mr-2"></a>
		</div>
	</div>

		<div th:replace = "fragments :: search_form_and_message('/brands/page/1')"></div>
	
	<div class="full-details">
		<table
			class="table table-bordered table-striped table-hover table-responsive-xl">
			<thead class="table-dark">
				<tr>
					<th class="hideable-column">ID</th>
					<th>Logo</th>
					<th th:replace="fragments :: column_link('/brands','name','Brand Name','none')">
					<th>Categories</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="brands : ${listBrands}">
					<td class="hideable-column">[[${brands.id}]]</td>
					<td>
						<img th:src="@{${brands.logoPath}}" style="width:100px" class="img-fluid"/>
					</td>
					<td>[[${brands.name}]]</td>
					<td>
						<th:block th:each="cat : ${brands.categories}">
						<span class="badge bg-secondary" th:text="${cat.name}"></span>
						</th:block>
					</td>
					<td>
						<div th:replace="fragments :: edit('brands','/brands/edit/'+${brands.id})"/>
						&nbsp;
						<div th:replace="fragments :: delete('brands',${brands.id},'/brands/delete/'+${brands.id},true)"/>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	
	<div class="less-details">
		 <div th:each = "brands : ${listBrands}" class="row m-1">
			<div class="col-4">
				<img th:src="@{${brands.logoPath}}" style="width:100px" class="img-fluid"/>
			</div>
			<div class="col-8">
				<div>[[${brands.name}]]</div>
		 			<div class="mt-2 d-flex align-items-center gap-2">
						<div th:replace="fragments :: edit('brands','/brands/edit/'+${brands.id})"/>
						&nbsp;
						<div th:replace="fragments :: delete('brands',${brands.id},'/brands/delete/'+${brands.id},true)"/>
		 			</div>
		 		</div>
	</div>
</div>	
		
	<div th:replace="fragments :: pagination('/brands','brands')"></div>
		
	<div th:replace="modal_fragment :: confirm_modal"></div>

	<div th:replace="fragments :: footer"></div>

<script th:src="@{/js/common_list.js}"></script>
<script type="text/javascript">

		$(document).ready(function(e){
			$(".link-delete").on("click",function(e){
				e.preventDefault();
				showDeleteConfirmModal($(this),'brand')
			});
		});

</script>
</body>
</html>
